<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sitcom Trivia — Are You a True Fan?</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;800;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:      #1a1a2e;
      --bg-alt:  #16213e;
      --card:    #0f3460;
      --red:     #e94560;
      --gold:    #f5c518;
      --green:   #4caf82;
      --muted:   #a0a0b0;
      --text:    #eaeaea;
      --font-d:  'Bebas Neue', Impact, sans-serif;
      --font-b:  'Nunito', Arial, sans-serif;
      --font-m:  'Courier Prime', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: rgba(15,15,35,0.97);
      border-bottom: 2px solid var(--red);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-family: var(--font-d);
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: var(--gold);
    }

    header a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }

    header a:hover { color: var(--text); }

    main {
      width: 100%;
      max-width: 720px;
      padding: 3rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Intro */
    #intro {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    #intro h2 {
      font-family: var(--font-d);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      letter-spacing: 3px;
      color: var(--text);
      line-height: 1;
    }

    #intro h2 span { color: var(--gold); }

    #intro p {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 480px;
    }

    .show-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .show-chip {
      padding: 0.5rem 1.1rem;
      border: 2px solid var(--card);
      border-radius: 30px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--muted);
    }

    .show-chip.selected {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    .show-chip:hover { border-color: var(--red); color: var(--text); }

    .diff-row {
      display: flex;
      gap: 0.75rem;
    }

    .diff-btn {
      padding: 0.5rem 1.25rem;
      border-radius: 30px;
      border: 2px solid var(--card);
      background: transparent;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .diff-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #111;
    }

    .btn-primary {
      padding: 0.85rem 2.5rem;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 30px;
      font-family: var(--font-d);
      font-size: 1.3rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }

    .btn-primary:hover:not(:disabled) { background: #c73550; transform: translateY(-2px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Quiz */
    #quiz { width: 100%; display: none; flex-direction: column; gap: 1.5rem; }

    .progress-bar-wrap {
      width: 100%;
      height: 6px;
      background: var(--card);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--red);
      transition: width 0.4s;
    }

    .quiz-meta {
      display: flex;
      justify-content: space-between;
      font-family: var(--font-m);
      font-size: 0.85rem;
      color: var(--muted);
    }

    .question-card {
      background: var(--card);
      border-radius: 10px;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .question-label {
      font-family: var(--font-m);
      font-size: 0.75rem;
      letter-spacing: 2px;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .question-text {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }

    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    @media (max-width: 500px) { .answers-grid { grid-template-columns: 1fr; } }

    .answer-btn {
      padding: 0.9rem 1rem;
      background: var(--bg-alt);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 0.98rem;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.3;
    }

    .answer-btn:hover:not(:disabled) {
      border-color: var(--gold);
      background: rgba(245,197,24,0.07);
    }

    .answer-btn.correct {
      background: rgba(76,175,130,0.2);
      border-color: var(--green);
      color: var(--green);
    }

    .answer-btn.wrong {
      background: rgba(233,69,96,0.2);
      border-color: var(--red);
      color: var(--red);
    }

    .feedback-box {
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-size: 0.98rem;
      line-height: 1.5;
      display: none;
    }

    .feedback-box.show { display: block; }
    .feedback-box.correct { background: rgba(76,175,130,0.15); border: 1px solid var(--green); color: var(--green); }
    .feedback-box.wrong   { background: rgba(233,69,96,0.15);  border: 1px solid var(--red);   color: #ff8fa0; }

    /* Results */
    #results {
      display: none;
      text-align: center;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    #results h2 {
      font-family: var(--font-d);
      font-size: clamp(2rem, 7vw, 3.5rem);
      letter-spacing: 3px;
      color: var(--text);
    }

    .score-display {
      font-family: var(--font-d);
      font-size: clamp(3.5rem, 14vw, 7rem);
      color: var(--gold);
      line-height: 1;
    }

    .score-label { color: var(--muted); font-size: 1rem; }

    .verdict {
      font-size: 1.15rem;
      color: var(--text);
      max-width: 460px;
      line-height: 1.5;
    }

    .results-btn-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-secondary {
      padding: 0.75rem 2rem;
      background: transparent;
      border: 2px solid var(--gold);
      color: var(--gold);
      border-radius: 30px;
      font-family: var(--font-d);
      font-size: 1.1rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-secondary:hover { background: var(--gold); color: #111; }

    footer {
      width: 100%;
      text-align: center;
      padding: 1.5rem;
      font-family: var(--font-m);
      font-size: 0.8rem;
      color: var(--muted);
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--gold); }
  </style>
</head>

    // ── State ──
    let selectedShow = null;
    let selectedDiff = 'easy';
    let questions    = [];
    let currentQ     = 0;
    let score        = 0;
    let answered     = false;

    // ── Element refs ──
    const introEl   = document.getElementById('intro');
    const quizEl    = document.getElementById('quiz');
    const resultsEl = document.getElementById('results');
    const startBtn  = document.getElementById('startBtn');
    const nextBtn   = document.getElementById('nextBtn');

    // ── Show chips ──
    document.getElementById('showGrid').addEventListener('click', e => {
      const chip = e.target.closest('.show-chip');
      if (!chip) return;
      document.querySelectorAll('.show-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      selectedShow = chip.dataset.show;
      startBtn.disabled = false;
    });

    // ── Difficulty buttons ──
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedDiff = btn.dataset.diff;
      });
    });

    // ── Start ──
    startBtn.addEventListener('click', startQuiz);

    function startQuiz() {
      // Pull the questions for the selected show + difficulty and shuffle them
      const pool = QUESTIONS[selectedShow][selectedDiff];
      questions = shuffle([...pool]).slice(0, 5);
      currentQ  = 0;
      score     = 0;
      showScreen('quiz');
      renderQuestion();
    }

    // Fisher-Yates shuffle
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // ── Render question ──
    function renderQuestion() {
      answered = false;
      nextBtn.style.display = 'none';

      const q     = questions[currentQ];
      const total = questions.length;

      document.getElementById('progressBar').style.width = `${(currentQ / total) * 100}%`;
      document.getElementById('questionCounter').textContent = `Question ${currentQ + 1} / ${total}`;
      document.getElementById('scoreCounter').textContent    = `Score: ${score}`;
      document.getElementById('questionShow').textContent    = `📺 ${selectedShow}`;
      document.getElementById('questionText').textContent    = q.question;

      const grid = document.getElementById('answersGrid');
      grid.innerHTML = '';
      q.answers.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className   = 'answer-btn';
        btn.textContent = ans;
        btn.addEventListener('click', () => selectAnswer(i));
        grid.appendChild(btn);
      });

      const fb = document.getElementById('feedbackBox');
      fb.className    = 'feedback-box';
      fb.textContent  = '';
    }

    // ── Select answer ──
    function selectAnswer(idx) {
      if (answered) return;
      answered = true;

      const q    = questions[currentQ];
      const btns = document.querySelectorAll('.answer-btn');
      btns.forEach(b => b.disabled = true);

      const isCorrect = idx === q.correct;
      if (isCorrect) score++;

      btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
      btns[q.correct].classList.add('correct');

      const fb = document.getElementById('feedbackBox');
      fb.textContent = isCorrect
        ? `✅ Correct! ${q.explanation}`
        : `❌ Not quite. ${q.explanation}`;
      fb.className = `feedback-box show ${isCorrect ? 'correct' : 'wrong'}`;

      document.getElementById('scoreCounter').textContent = `Score: ${score}`;
      nextBtn.style.display  = 'block';
      nextBtn.textContent    = currentQ + 1 < questions.length ? 'NEXT QUESTION →' : 'SEE RESULTS →';
    }

    // ── Next / Results ──
    nextBtn.addEventListener('click', () => {
      currentQ++;
      if (currentQ < questions.length) {
        renderQuestion();
      } else {
        showResults();
      }
    });

    function showResults() {
      const total = questions.length;
      document.getElementById('progressBar').style.width    = '100%';
      document.getElementById('scoreDisplay').textContent   = `${score}/${total}`;
      document.getElementById('scoreLabel').textContent     = 'questions correct';

      const pct = score / total;
      let verdict, title;
      if (pct === 1)       { title = '🏆 PERFECT SCORE!';  verdict = `Flawless. You basically ARE ${selectedShow}. Seriously impressive.`; }
      else if (pct >= 0.8) { title = '🌟 ALMOST PERFECT';  verdict = `You know ${selectedShow} inside and out — just one or two slips.`; }
      else if (pct >= 0.6) { title = '👍 SOLID FAN';       verdict = `A respectable showing. You know your ${selectedShow}, but there's more to discover.`; }
      else if (pct >= 0.4) { title = '😅 CASUAL VIEWER';   verdict = `You've seen some ${selectedShow}, but it might be time for a rewatch.`; }
      else                  { title = '📺 START WATCHING';  verdict = `${selectedShow} deserves a spot on your watchlist immediately.`; }

      document.getElementById('resultsTitle').textContent = title;
      document.getElementById('verdictText').textContent  = verdict;
      showScreen('results');
    }

    // ── Play Again / New Show ──
    document.getElementById('playAgainBtn').addEventListener('click', startQuiz);
    document.getElementById('newShowBtn').addEventListener('click', () => {
      questions = [];
      currentQ  = 0;
      score     = 0;
      showScreen('intro');
    });

    // ── Screen helper ──
    function showScreen(name) {
      introEl.style.display   = name === 'intro'   ? 'flex' : 'none';
      quizEl.style.display    = name === 'quiz'    ? 'flex' : 'none';
      resultsEl.style.display = name === 'results' ? 'flex' : 'none';
    }

  </script>
